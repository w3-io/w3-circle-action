name: 'W3 Circle Action'
description: 'Circle CCTP, programmable wallets, transfers, compliance, and fee estimation'
author: 'w3-io'

inputs:
  command:
    description: >
      Operation to perform. CCTP on-chain: approve-burn, burn, mint, replace-message
      (burn/mint auto-detect EVM vs Solana). CCTP off-chain: get-attestation,
      wait-for-attestation, get-supported-chains, get-domain-info. Wallets:
      create-wallet-set, create-wallet, get-wallet, list-wallets, get-balance.
      Transactions: transfer, get-transaction, estimate-fee. Compliance: screen-address.
    required: true

  # Authentication
  api-key:
    description: 'Circle Platform API key (required for wallet/transaction/compliance commands, not for CCTP)'
    required: false
  entity-secret:
    description: 'Entity secret (32-byte hex) for wallet creation and transaction signing'
    required: false
  api-url:
    description: 'Circle Platform API base URL override'
    required: false

  # IRIS API config
  iris-url:
    description: 'IRIS API base URL override'
    required: false
  sandbox:
    description: 'Use IRIS sandbox (testnet) instead of production (default: false)'
    required: false
    default: 'false'

  # CCTP on-chain inputs
  private-key:
    description: 'Wallet private key for on-chain CCTP commands. EVM: 0x-prefixed hex. Solana: base58 keypair or JSON byte array.'
    required: false
  rpc-url:
    description: 'JSON-RPC endpoint URL (can also set per-chain env vars like ETHEREUM_SEPOLIA_RPC_URL)'
    required: false
  destination-chain:
    description: 'Destination chain name for burn command (e.g. "avalanche-fuji")'
    required: false
  destination-caller:
    description: 'Restrict who can call receiveMessage on destination (address). Omit for permissionless.'
    required: false
  message-bytes:
    description: 'Message bytes from burn step (for mint command)'
    required: false
  attestation:
    description: 'Attestation from wait-for-attestation (for mint command)'
    required: false
  original-message-bytes:
    description: 'Original message bytes (for replace-message command)'
    required: false
  original-attestation:
    description: 'Original attestation (for replace-message command)'
    required: false

  # CCTP off-chain inputs
  message-hash:
    description: '0x-prefixed keccak256 hash of the CCTP message (from MessageSent event)'
    required: false
  chain:
    description: 'Chain name (e.g. "ethereum", "arbitrum-sepolia")'
    required: false
  network:
    description: 'Filter chains by network: "mainnet" or "testnet"'
    required: false

  # Wallet inputs
  wallet-id:
    description: 'Wallet UUID'
    required: false
  wallet-set-id:
    description: 'Wallet set UUID'
    required: false
  name:
    description: 'Name for wallet set creation'
    required: false
  blockchains:
    description: 'Comma-separated blockchain identifiers (e.g. "ETH-SEPOLIA,AVAX-FUJI")'
    required: false
  count:
    description: 'Number of wallets to create (default: 1)'
    required: false
    default: '1'
  blockchain:
    description: 'Single blockchain filter (e.g. "ETH-SEPOLIA")'
    required: false
  page-size:
    description: 'Results per page for list operations (default: 10)'
    required: false
    default: '10'

  # Transaction inputs
  destination-address:
    description: 'Recipient blockchain address'
    required: false
  token-id:
    description: 'Circle token UUID'
    required: false
  amount:
    description: 'Transfer amount as string (e.g. "1.50")'
    required: false
  transaction-id:
    description: 'Transaction UUID'
    required: false

  # Compliance inputs
  address:
    description: 'Blockchain address to screen for compliance'
    required: false

  # Polling config (for wait-for-attestation)
  poll-interval:
    description: 'Seconds between attestation polls (default: 5)'
    required: false
    default: '5'
  max-attempts:
    description: 'Maximum attestation poll attempts (default: 60)'
    required: false
    default: '60'

  # Request configuration
  timeout:
    description: 'Request timeout in seconds (default: 30)'
    required: false
    default: '30'

outputs:
  result:
    description: 'JSON result of the operation'

runs:
  using: 'node20'
  main: 'dist/index.cjs'
