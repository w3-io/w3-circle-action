name: 'W3 Circle Action'
description: 'Cross-chain USDC transfers via Circle CCTP — attestation, domain lookup, and transfer status'
author: 'w3-io'

inputs:
  command:
    description: 'Operation: get-attestation, wait-for-attestation, get-supported-chains, get-domain-info'
    required: true

  # Authentication (not required for CCTP/IRIS commands)
  api-key:
    description: 'Circle Platform API key (required for wallet/compliance commands, not for CCTP)'
    required: false

  # IRIS API config
  iris-url:
    description: 'IRIS API base URL override'
    required: false
  sandbox:
    description: 'Use IRIS sandbox (testnet) instead of production (default: false)'
    required: false
    default: 'false'

  # CCTP inputs
  message-hash:
    description: '0x-prefixed keccak256 hash of the CCTP message (from MessageSent event)'
    required: false
  chain:
    description: 'Chain name (e.g. "ethereum", "arbitrum-sepolia")'
    required: false
  network:
    description: 'Filter chains by network: "mainnet" or "testnet"'
    required: false

  # Polling config (for wait-for-attestation)
  poll-interval:
    description: 'Seconds between attestation polls (default: 5)'
    required: false
    default: '5'
  max-attempts:
    description: 'Maximum attestation poll attempts (default: 60)'
    required: false
    default: '60'

  # Retry configuration
  max-retries:
    description: 'Maximum retry attempts (default: 3)'
    required: false
    default: '3'
  retry-delay:
    description: 'Base retry delay in seconds (default: 2)'
    required: false
    default: '2'
  timeout:
    description: 'Request timeout in seconds (default: 30)'
    required: false
    default: '30'

outputs:
  result:
    description: 'JSON result of the operation'

runs:
  using: 'node20'
  main: 'dist/index.js'
