name: Circle CCTP attestation check

on:
  workflow_dispatch:
    inputs:
      message-hash:
        description: 'CCTP message hash (0x-prefixed keccak256)'
        required: true

jobs:
  check-attestation:
    runs-on: ubuntu-latest
    steps:
      - name: Check attestation
        id: attest
        uses: w3-io/w3-circle-action@v0
        with:
          command: get-attestation
          sandbox: 'true'
          message-hash: ${{ inputs.message-hash }}

      - name: Show result
        run: |
          echo "Attestation status:"
          echo '${{ steps.attest.outputs.result }}' | jq .

  list-chains:
    runs-on: ubuntu-latest
    steps:
      - name: Get testnet chains
        id: chains
        uses: w3-io/w3-circle-action@v0
        with:
          command: get-supported-chains
          network: testnet

      - name: Show chains
        run: |
          echo "Supported testnet chains:"
          echo '${{ steps.chains.outputs.result }}' | jq '.chains[] | {name, domain, chainId}'
