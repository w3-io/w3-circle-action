# E2E Test Workflow
#
# Exercises Circle Platform + CCTP APIs end-to-end. Run locally with:
#   CIRCLE_API_KEY=... CIRCLE_ENTITY_SECRET=<64-hex> \
#     w3 workflow test --execute test/workflows/e2e.yaml
#
# Skipped steps are kept in place as commented blocks with the reason,
# so the file doubles as a living map of what needs what to unblock.

name: circle-e2e
on:
  workflow_dispatch: {}

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      # ── CCTP Discovery ─────────────────────────────────────────────────────

      - name: Get supported CCTP chains
        uses: w3-io/w3-circle-action@v0
        with:
          command: get-supported-chains
          sandbox: 'true'

      - name: Get domain info for Ethereum Sepolia
        uses: w3-io/w3-circle-action@v0
        with:
          command: get-domain-info
          chain: ethereum-sepolia
          sandbox: 'true'

      # ── Wallet Sets ────────────────────────────────────────────────────────

      - name: Create a wallet set
        id: create_wallet_set
        uses: w3-io/w3-circle-action@v0
        with:
          command: create-wallet-set
          api-key: ${{ secrets.CIRCLE_API_KEY }}
          entity-secret: ${{ secrets.CIRCLE_ENTITY_SECRET }}
          name: E2E Test Wallet Set

      - name: Extract wallet set ID
        id: wallet_set
        run: |
          echo "id=$(echo '${{ steps.create_wallet_set.outputs.result }}' | jq -r '.walletSet.id // .id')" >> "$GITHUB_OUTPUT"

      # ── Wallets ────────────────────────────────────────────────────────────

      - name: Create a wallet on ETH Sepolia
        id: create_wallet
        uses: w3-io/w3-circle-action@v0
        with:
          command: create-wallet
          api-key: ${{ secrets.CIRCLE_API_KEY }}
          entity-secret: ${{ secrets.CIRCLE_ENTITY_SECRET }}
          wallet-set-id: ${{ steps.wallet_set.outputs.id }}
          blockchains: ETH-SEPOLIA
          count: '1'

      - name: Extract wallet ID and address
        id: wallet
        run: |
          echo "id=$(echo '${{ steps.create_wallet.outputs.result }}' | jq -r '.[0].id')" >> "$GITHUB_OUTPUT"
          echo "address=$(echo '${{ steps.create_wallet.outputs.result }}' | jq -r '.[0].address')" >> "$GITHUB_OUTPUT"

      - name: List wallets
        uses: w3-io/w3-circle-action@v0
        with:
          command: list-wallets
          api-key: ${{ secrets.CIRCLE_API_KEY }}
          page-size: '5'

      - name: Get the created wallet
        uses: w3-io/w3-circle-action@v0
        with:
          command: get-wallet
          api-key: ${{ secrets.CIRCLE_API_KEY }}
          wallet-id: ${{ steps.wallet.outputs.id }}

      - name: Get wallet balance
        uses: w3-io/w3-circle-action@v0
        with:
          command: get-balance
          api-key: ${{ secrets.CIRCLE_API_KEY }}
          wallet-id: ${{ steps.wallet.outputs.id }}

      # ── Skipped, with reasons ──────────────────────────────────────────────
      #
      # CCTP Attestation:
      #   get-attestation        — needs tx-hash + source-domain from a burn
      #   wait-for-attestation   — same
      #
      # CCTP On-Chain:
      #   approve-burn           — needs a funded wallet (ETH for gas + USDC balance)
      #   burn                   — same, plus calls approve-burn first
      #   mint                   — needs message-bytes + attestation from burn
      #   replace-message        — needs an original message that errored
      #
      # Transactions:
      #   transfer               — needs funded wallet with token balance
      #   get-transaction        — needs a completed transaction ID
      #   estimate-fee           — sandbox rejects when balance is zero
      #
      # Compliance:
      #   screen-address         — production-only; sandbox returns 400
      #
      # Setup:
      #   register-entity-secret — one-time, already registered for this account
