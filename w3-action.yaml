kind: integration
partner: circle
name: Circle
version: 1.0.0
repo: w3-io/w3-circle-action
description: >
  Circle provides USDC infrastructure including CCTP (Cross-Chain Transfer
  Protocol) for burn-and-mint USDC transfers across 8+ chains with no
  bridge fees, programmable wallets with entity-secret encryption for
  developer-controlled custody, compliance screening, and a sandbox
  environment for testing.
context: >
  Use when you need USDC cross-chain transfers (CCTP: approve-burn, burn,
  wait-for-attestation, mint), programmable wallet custody, or compliance
  screening. Do not use for general payments — use Stripe or PayPal
  instead. Cost: CCTP charges only gas fees with no bridge fee; wallet
  and compliance API calls are usage-based. Safety: CCTP transfers are
  irreversible once attested by Circle; always verify destination address
  and chain before burning. Prerequisites: Circle API key required for
  Platform API (wallets, transfers, compliance); entity secret must be
  registered before wallet creation; CCTP on-chain commands require a
  private key and RPC access.

commands:
  # -- CCTP (IRIS API, no auth) ------------------------------------------------

  - name: get-attestation
    description: >
      Get CCTP attestation status for a cross-chain message. Returns the
      attestation signature once Circle's attestation service has observed
      and signed the MessageSent event from the source chain.
    inputs:
      message-hash:
        type: string
        required: true
        description: 0x-prefixed keccak256 hash of the CCTP message
    outputs:
      result:
        type: object
        description: '{messageHash, status, attestation}'

  - name: wait-for-attestation
    description: >
      Poll for CCTP attestation until complete or timeout. Use this in
      workflows that need to wait for attestation before calling
      receiveMessage on the destination chain.
    inputs:
      tx-hash:
        type: string
        required: false
        description: Source chain transaction hash (V2 — preferred, instant with fee)
      source-domain:
        type: number
        required: false
        description: 'CCTP source domain number (V2 — use with tx-hash)'
      message-hash:
        type: string
        required: false
        description: 0x-prefixed keccak256 hash of the CCTP message (V1 fallback)
      poll-interval:
        type: number
        required: false
        description: 'Seconds between polls (default: 5)'
      max-attempts:
        type: number
        required: false
        description: 'Maximum poll attempts (default: 60)'
    outputs:
      result:
        type: object
        description: '{messageHash, status, attestation, attempts}'

  - name: get-supported-chains
    description: >
      List all chains supported by CCTP with domain numbers, chain IDs,
      and USDC contract addresses.
    inputs:
      network:
        type: string
        required: false
        description: 'Filter by network: mainnet or testnet'
    outputs:
      result:
        type: object
        description: '{chains: [{name, domain, chainId, usdc, network, contracts}], count}'

  - name: get-domain-info
    description: >
      Get CCTP domain info for a specific chain — domain number, chain ID,
      USDC address, and contract addresses.
    inputs:
      chain:
        type: string
        required: true
        description: 'Chain name (e.g. ethereum, arbitrum-sepolia)'
    outputs:
      result:
        type: object
        description: '{name, domain, chainId, usdc, network, contracts}'

  # -- CCTP on-chain (requires private-key + RPC) -------------------------------

  - name: approve-burn
    description: >
      Approve the CCTP TokenMessenger contract to spend USDC before burning.
      Must be called before the burn command on EVM chains.
    inputs:
      chain:
        type: string
        required: true
        description: 'Source chain name (e.g. ethereum-sepolia, avalanche-fuji)'
      amount:
        type: string
        required: true
        description: 'USDC amount to approve (human units, e.g. "10.0")'
      rpc-url:
        type: string
        required: false
        description: Custom RPC endpoint URL (uses default if omitted)
    outputs:
      result:
        type: object
        description: '{txHash, amount, chain}'

  - name: burn
    description: >
      Burn USDC on the source chain to initiate a CCTP cross-chain transfer.
      Call approve-burn first on EVM chains, then burn, then wait-for-attestation,
      then mint on the destination chain.
    inputs:
      chain:
        type: string
        required: true
        description: 'Source chain name (e.g. ethereum-sepolia)'
      destination-chain:
        type: string
        required: true
        description: 'Destination chain name (e.g. avalanche-fuji)'
      destination-address:
        type: string
        required: true
        description: Recipient address on the destination chain
      amount:
        type: string
        required: true
        description: 'USDC amount to burn (human units, e.g. "10.0")'
      destination-caller:
        type: string
        required: false
        description: Address permitted to call receiveMessage on destination (0x0 = anyone)
      rpc-url:
        type: string
        required: false
        description: Custom RPC endpoint URL (uses default if omitted)
    outputs:
      result:
        type: object
        description: '{txHash, messageHash, messageBytes, sourceDomain, destinationDomain}'

  - name: mint
    description: >
      Receive USDC on the destination chain by calling receiveMessage with the
      attestation from Circle. Final step of a CCTP cross-chain transfer.
    inputs:
      chain:
        type: string
        required: true
        description: 'Destination chain name (e.g. avalanche-fuji)'
      message-bytes:
        type: string
        required: true
        description: Raw CCTP message bytes from the burn transaction
      attestation:
        type: string
        required: true
        description: Attestation signature from Circle attestation service
      rpc-url:
        type: string
        required: false
        description: Custom RPC endpoint URL (uses default if omitted)
    outputs:
      result:
        type: object
        description: '{txHash, chain}'

  - name: replace-message
    description: >
      Replace a pending CCTP message before it is received on the destination
      chain. Useful for changing the destination caller after burn.
    inputs:
      chain:
        type: string
        required: true
        description: 'Chain where the original message was sent'
      original-message-bytes:
        type: string
        required: true
        description: Original CCTP message bytes from the burn transaction
      original-attestation:
        type: string
        required: true
        description: Original attestation signature from Circle
      destination-caller:
        type: string
        required: false
        description: New address permitted to call receiveMessage on destination
    outputs:
      result:
        type: object
        description: '{txHash, messageHash, messageBytes}'

  # -- Setup (Platform API, requires api-key + entity-secret) -------------------

  - name: register-entity-secret
    description: >
      One-time setup. Registers your entity secret with Circle so wallet
      creation and transaction signing work. Returns a recovery file.
    inputs: {}
    outputs:
      result:
        type: object
        description: '{recoveryFile}'

  # -- Wallets (Platform API, requires api-key) --------------------------------

  - name: create-wallet-set
    description: Create a wallet set to group related developer-controlled wallets.
    inputs:
      name:
        type: string
        required: true
        description: Wallet set name
    outputs:
      result:
        type: object
        description: '{id, name, custodyType, createDate, updateDate}'

  - name: create-wallet
    description: >
      Create developer-controlled wallets in a wallet set for one or more
      blockchains.
    inputs:
      wallet-set-id:
        type: string
        required: true
        description: Wallet set UUID
      blockchains:
        type: string
        required: true
        description: 'Comma-separated blockchain identifiers (e.g. "ETH-SEPOLIA,AVAX-FUJI")'
      count:
        type: number
        required: false
        description: 'Number of wallets to create (default: 1)'
    outputs:
      result:
        type: array
        description: '[{id, address, blockchain, walletSetId, ...}]'

  - name: get-wallet
    description: Get wallet details by ID.
    inputs:
      wallet-id:
        type: string
        required: true
        description: Wallet UUID
    outputs:
      result:
        type: object
        description: '{id, address, blockchain, walletSetId, state, ...}'

  - name: list-wallets
    description: List wallets with optional filters by wallet set or blockchain.
    inputs:
      wallet-set-id:
        type: string
        required: false
        description: Filter by wallet set UUID
      blockchain:
        type: string
        required: false
        description: Filter by blockchain (e.g. "ETH-SEPOLIA")
      page-size:
        type: number
        required: false
        description: 'Results per page (default: 10)'
    outputs:
      result:
        type: array
        description: '[{id, address, blockchain, state, ...}]'

  - name: get-balance
    description: Get token balances for a wallet.
    inputs:
      wallet-id:
        type: string
        required: true
        description: Wallet UUID
    outputs:
      result:
        type: array
        description: '[{token: {id, name, symbol}, amount, ...}]'

  # -- Transactions (Platform API, requires api-key) ---------------------------

  - name: transfer
    description: >
      Transfer tokens from a developer-controlled wallet to a destination
      address. Supports USDC and other tokens on any supported blockchain.
    inputs:
      wallet-id:
        type: string
        required: true
        description: Source wallet UUID
      destination-address:
        type: string
        required: true
        description: Recipient blockchain address
      amount:
        type: string
        required: true
        description: 'Transfer amount (e.g. "1.50")'
      token-id:
        type: string
        required: false
        description: Circle token UUID
      blockchain:
        type: string
        required: false
        description: Blockchain identifier
    outputs:
      result:
        type: object
        description: '{id, state, amounts, sourceAddress, destinationAddress, ...}'

  - name: get-transaction
    description: Get transaction details and status by ID.
    inputs:
      transaction-id:
        type: string
        required: true
        description: Transaction UUID
    outputs:
      result:
        type: object
        description: '{id, state, transactionType, amounts, txHash, ...}'

  - name: estimate-fee
    description: Estimate gas fee for a token transfer before executing.
    inputs:
      wallet-id:
        type: string
        required: true
        description: Source wallet UUID
      destination-address:
        type: string
        required: true
        description: Recipient blockchain address
      token-id:
        type: string
        required: true
        description: Circle token UUID
      amount:
        type: string
        required: true
        description: Transfer amount
    outputs:
      result:
        type: object
        description: '{low, medium, high}'

  # -- Compliance (Platform API, requires api-key) -----------------------------

  - name: screen-address
    description: >
      Screen a blockchain address for compliance (KYC/AML). Returns risk
      indicators and screening verdict.
    inputs:
      address:
        type: string
        required: true
        description: Blockchain address to screen
      blockchain:
        type: string
        required: true
        description: 'Blockchain identifier (e.g. "ETH", "ETH-SEPOLIA")'
    outputs:
      result:
        type: object
        description: '{result, riskScore, ...}'
