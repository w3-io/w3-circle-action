name: onramp-and-distribute

on:
  workflow_dispatch:
    inputs:
      amount:
        type: string
        description: "USD amount to onramp (e.g., '3000')"
        required: true
      customer-id:
        type: string
        description: 'Iron customer ID'
        required: true

jobs:
  onramp:
    runs-on: ubuntu-latest
    environment: iron-sandbox
    outputs:
      usdc-amount: ${{ steps.quote.outputs.result }}
    steps:
      - name: Get onramp quote
        id: quote
        uses: w3-io/w3-iron-action@v1
        with:
          command: get-quote
          api-key: ${{ secrets.IRON_API_KEY }}
          api-url: 'https://api.sandbox.iron.xyz'
          customer-id: ${{ inputs.customer-id }}
          source-currency: USD
          destination-currency: USDC
          source-amount: ${{ inputs.amount }}
          destination-chain: Avalanche

      - name: Create onramp
        id: onramp
        uses: w3-io/w3-iron-action@v1
        with:
          command: create-autoramp
          api-key: ${{ secrets.IRON_API_KEY }}
          api-url: 'https://api.sandbox.iron.xyz'
          body: |
            {
              "customer_id": "${{ inputs.customer-id }}",
              "source_currency": "USD",
              "destination_currency": "USDC",
              "source_amount": "${{ inputs.amount }}",
              "destination_address_id": "${{ secrets.AVAX_ADDRESS_ID }}"
            }

      - name: Simulate sandbox completion
        uses: w3-io/w3-iron-action@v1
        with:
          command: sandbox-update-transaction
          api-key: ${{ secrets.IRON_API_KEY }}
          api-url: 'https://api.sandbox.iron.xyz'
          autoramp-id: ${{ fromJSON(steps.onramp.outputs.result).id }}
          sandbox-status: completed

  distribute:
    needs: onramp
    runs-on: ubuntu-latest
    environment: cctp
    steps:
      # Read the USDC balance that landed on Avalanche
      - name: Check USDC balance
        id: balance
        ethereum:
          network: avalanche
          read:
            read-contract:
              contract: '0xb97ef9ef8734c71904d8002f8b6bc66dd9c48a6e'
              method: 'function balanceOf(address) returns (uint256)'
              args: ['${{ secrets.AVAX_WALLET_ADDRESS }}']
              rpcUrl: '${{ secrets.AVALANCHE_RPC_URL }}'

      - name: Calculate shares
        id: shares
        run: |
          TOTAL=${{ steps.balance.outputs.result }}
          THIRD=$(( TOTAL / 3 ))
          REMAINDER=$(( TOTAL - THIRD * 2 ))
          echo "third=$THIRD" >> "$GITHUB_OUTPUT"
          echo "remainder=$REMAINDER" >> "$GITHUB_OUTPUT"

      # ─────────────────────────────────────────────────────────
      # Leg 1: CCTP Avalanche → Base (1/3)
      # ─────────────────────────────────────────────────────────

      - name: 'Base: Approve burn'
        uses: w3-io/w3-circle-action@v0
        with:
          command: approve-burn
          chain: avalanche
          amount: ${{ steps.shares.outputs.third }}
          private-key: ${{ secrets.CCTP_PRIVATE_KEY }}

      - name: 'Base: Burn USDC on Avalanche'
        id: burn_base
        uses: w3-io/w3-circle-action@v0
        with:
          command: burn
          chain: avalanche
          destination-chain: base
          destination-address: ${{ secrets.BASE_RECIPIENT }}
          amount: ${{ steps.shares.outputs.third }}
          private-key: ${{ secrets.CCTP_PRIVATE_KEY }}

      # ─────────────────────────────────────────────────────────
      # Leg 2: CCTP Avalanche → Solana (1/3)
      # ─────────────────────────────────────────────────────────

      - name: 'Solana: Approve burn'
        uses: w3-io/w3-circle-action@v0
        with:
          command: approve-burn
          chain: avalanche
          amount: ${{ steps.shares.outputs.third }}
          private-key: ${{ secrets.CCTP_PRIVATE_KEY }}

      - name: 'Solana: Burn USDC on Avalanche'
        id: burn_solana
        uses: w3-io/w3-circle-action@v0
        with:
          command: burn
          chain: avalanche
          destination-chain: solana
          destination-address: ${{ secrets.SOLANA_RECIPIENT }}
          amount: ${{ steps.shares.outputs.third }}
          private-key: ${{ secrets.CCTP_PRIVATE_KEY }}

      # ─────────────────────────────────────────────────────────
      # Wait for both attestations
      # ─────────────────────────────────────────────────────────

      - name: 'Base: Wait for attestation'
        id: attest_base
        uses: w3-io/w3-circle-action@v0
        timeout-minutes: 25
        with:
          command: wait-for-attestation
          message-hash: ${{ fromJSON(steps.burn_base.outputs.result).messageHash }}
          poll-interval: '15'
          max-attempts: '80'

      - name: 'Solana: Wait for attestation'
        id: attest_solana
        uses: w3-io/w3-circle-action@v0
        timeout-minutes: 25
        with:
          command: wait-for-attestation
          message-hash: ${{ fromJSON(steps.burn_solana.outputs.result).messageHash }}
          poll-interval: '15'
          max-attempts: '80'

      # ─────────────────────────────────────────────────────────
      # Mint on destination chains
      # ─────────────────────────────────────────────────────────

      - name: 'Base: Mint USDC'
        uses: w3-io/w3-circle-action@v0
        with:
          command: mint
          chain: base
          message-bytes: ${{ fromJSON(steps.burn_base.outputs.result).messageBytes }}
          attestation: ${{ fromJSON(steps.attest_base.outputs.result).attestation }}
          private-key: ${{ secrets.CCTP_PRIVATE_KEY }}

      - name: 'Solana: Mint USDC'
        uses: w3-io/w3-circle-action@v0
        with:
          command: mint
          chain: solana
          message-bytes: ${{ fromJSON(steps.burn_solana.outputs.result).messageBytes }}
          attestation: ${{ fromJSON(steps.attest_solana.outputs.result).attestation }}
          private-key: ${{ secrets.SOLANA_PRIVATE_KEY }}

      # ─────────────────────────────────────────────────────────
      # Remaining 1/3 stays on Avalanche — no action needed
      # ─────────────────────────────────────────────────────────

      - name: Summary
        run: |
          echo "Distribution complete:"
          echo "  Avalanche: ${{ steps.shares.outputs.remainder }} USDC (stays)"
          echo "  Base:      ${{ steps.shares.outputs.third }} USDC (CCTP)"
          echo "  Solana:    ${{ steps.shares.outputs.third }} USDC (CCTP)"
